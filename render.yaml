# ============================================================
# CodeMorph — Render Configuration (FREE TIER ONLY)
# ✅ Plan free : 0$/mo — web service avec sleep après 15min inactivité
# ✅ PostgreSQL free : 0$/mo — 1GB, expire après 90 jours (renouveler)
# ❌ Redis : PAS de free tier sur Render → utiliser Upstash (gratuit)
#
# DÉPLOIEMENT SANS BLUEPRINT (Blueprint = payant) :
# → Voir docs/RENDER_FREE_DEPLOY.md pour les étapes manuelles
#
# Ce fichier sert de RÉFÉRENCE pour la configuration manuelle.
# Il ne peut PAS être utilisé comme Blueprint (réservé aux plans payants).
# ============================================================

# ── INSTRUCTIONS : Déploiement manuel Render Free ────────────
#
# ÉTAPE 1 : PostgreSQL (gratuit 90 jours)
#   Dashboard → New → PostgreSQL
#   Name: codemorph-postgres | Region: Frankfurt | Plan: Free
#   → Copier "Internal Database URL"
#
# ÉTAPE 2 : Web Service — Backend (gratuit, sleep mode)
#   Dashboard → New → Web Service → Connect GitHub → codemorph
#   Name: codemorph-backend
#   Runtime: Docker | Dockerfile Path: ./backend/Dockerfile
#   Docker Context: . (racine du repo)
#   Region: Frankfurt | Branch: main | Plan: Free
#   → Ajouter les variables d'environnement ci-dessous
#
# ÉTAPE 3 : Web Service — AI Engine (gratuit, sleep mode)
#   Dashboard → New → Web Service → Connect GitHub → codemorph
#   Name: codemorph-ai
#   Runtime: Docker | Dockerfile Path: ./ai-engine/Dockerfile.render
#   Docker Context: . (racine du repo)
#   Region: Frankfurt | Branch: main | Plan: Free
#
# ÉTAPE 4 : Upstash Redis (gratuit — https://upstash.com)
#   → Créer compte, New Database, copier REDIS_URL
#   → Format: rediss://default:PASSWORD@HOST:PORT

# ────────────────────────────────────────────────────────────
# VARIABLES D'ENVIRONNEMENT — Backend (codemorph-backend)
# À configurer dans Render Dashboard → Service → Environment
# ────────────────────────────────────────────────────────────
#
# NODE_ENV=production
# PORT=4000                              (Render injecte $PORT automatiquement)
# LOG_LEVEL=warn
#
# DATABASE_URL=<Internal DB URL depuis Render PostgreSQL>
# DATABASE_SSL=true
#
# REDIS_URL=<URL depuis Upstash>         (optionnel en V1 — désactiver si absent)
#
# JWT_SECRET=<openssl rand -base64 64>
# JWT_REFRESH_SECRET=<openssl rand -base64 64>
# JWT_EXPIRES_IN=15m
# JWT_REFRESH_EXPIRES_IN=7d
# COOKIE_SECRET=<openssl rand -base64 32>
#
# FRONTEND_URL=https://YOUR-SITE.netlify.app
#
# GITHUB_CLIENT_ID=<depuis GitHub OAuth App>
# GITHUB_CLIENT_SECRET=<depuis GitHub OAuth App>
# GITHUB_CALLBACK_URL=https://codemorph-backend.onrender.com/auth/github/callback
#
# GOOGLE_CLIENT_ID=<depuis Google Cloud Console>
# GOOGLE_CLIENT_SECRET=<depuis Google Cloud Console>
# GOOGLE_CALLBACK_URL=https://codemorph-backend.onrender.com/auth/google/callback
#
# AI_ENGINE_URL=https://codemorph-ai.onrender.com
# AI_ENGINE_SECRET=<openssl rand -base64 32>
#
# FEATURE_BILLING=false
# FEATURE_ANALYTICS=false

# ────────────────────────────────────────────────────────────
# VARIABLES D'ENVIRONNEMENT — AI Engine (codemorph-ai)
# ────────────────────────────────────────────────────────────
#
# NODE_ENV=production
# AI_PORT=5000
# LOG_LEVEL=warn
# AI_ENGINE_SECRET=<même valeur que backend>
#
# GROQ_API_KEY=<depuis console.groq.com — GRATUIT>
# OPENAI_API_KEY=                        (optionnel — platform tier)
#
# API_URL=https://codemorph-backend.onrender.com/api/v1
