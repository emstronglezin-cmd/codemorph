# ============================================================
# CodeMorph — Render.com Deployment Configuration
# Services: backend (NestJS API) + Redis (Bull queues)
# Doc: https://render.com/docs/blueprint-spec
# ============================================================

services:

  # ── Backend API (NestJS) ────────────────────────────────────
  - type: web
    name: codemorph-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    region: frankfurt  # eu-central (change to: oregon, ohio, virginia, singapore)
    plan: starter      # $7/mo — upgrade to standard for production load
    branch: main

    # Render injects PORT automatically — app reads process.env.PORT
    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 4000

      # ── Database (PostgreSQL — add Render Postgres service below) ──
      - key: DATABASE_URL
        fromDatabase:
          name: codemorph-postgres
          property: connectionString

      # ── Redis (add Render Redis service below) ──
      - key: REDIS_URL
        fromService:
          name: codemorph-redis
          type: redis
          property: connectionString

      # ── JWT secrets (set in Render dashboard > Environment) ──
      - key: JWT_SECRET
        sync: false   # Must be set manually in Render dashboard

      - key: JWT_REFRESH_SECRET
        sync: false

      - key: COOKIE_SECRET
        sync: false

      # ── CORS ──────────────────────────────────────────────────
      - key: FRONTEND_URL
        sync: false   # Set to your Netlify URL in Render dashboard

      # ── OAuth (set in Render dashboard) ───────────────────────
      - key: GOOGLE_CLIENT_ID
        sync: false

      - key: GOOGLE_CLIENT_SECRET
        sync: false

      - key: GOOGLE_CALLBACK_URL
        sync: false   # https://your-backend.onrender.com/api/v1/auth/google/callback

      - key: GITHUB_CLIENT_ID
        sync: false

      - key: GITHUB_CLIENT_SECRET
        sync: false

      - key: GITHUB_CALLBACK_URL
        sync: false   # https://your-backend.onrender.com/api/v1/auth/github/callback

      # ── AI Engine ─────────────────────────────────────────────
      - key: AI_ENGINE_URL
        sync: false   # URL of your Python AI engine (if deployed separately)

      # ── Stripe (set in Render dashboard) ──────────────────────
      - key: STRIPE_SECRET_KEY
        sync: false

      - key: STRIPE_WEBHOOK_SECRET
        sync: false

    # Health check endpoint
    healthCheckPath: /api/v1/health

    # Auto-deploy on push to main
    autoDeploy: true

  # ── Redis (Bull job queues) ─────────────────────────────────
  - type: redis
    name: codemorph-redis
    region: frankfurt
    plan: starter   # $10/mo — 25MB RAM
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []  # Allow all — internal Render network only

# ── PostgreSQL Database ────────────────────────────────────
databases:
  - name: codemorph-postgres
    region: frankfurt
    plan: starter   # $7/mo — 1GB storage, 1 connection pool
    databaseName: codemorph
    user: codemorph
    ipAllowList: []  # Allow all — internal Render network only
