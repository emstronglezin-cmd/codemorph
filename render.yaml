# ============================================================
# CodeMorph — Render Blueprint
# Services: backend (NestJS) + Redis + PostgreSQL
# Deploy: Render Dashboard → New → Blueprint → connect repo
# Doc: https://render.com/docs/blueprint-spec
# ============================================================

services:

  # ── Backend API (NestJS — Docker) ──────────────────────────
  - type: web
    name: codemorph-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .                    # build context = repo root
    region: frankfurt                   # eu-central — change to: oregon, ohio, singapore
    plan: starter                       # $7/mo — upgrade to standard ($25) for production load
    branch: main
    autoDeploy: true

    envVars:
      # ── App ──────────────────────────────────────────────────
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 4000

      - key: LOG_LEVEL
        value: warn

      # ── Database — auto-injected from codemorph-postgres ─────
      - key: DATABASE_URL
        fromDatabase:
          name: codemorph-postgres
          property: connectionString

      - key: DATABASE_SSL
        value: "true"

      # ── Redis — auto-injected from codemorph-redis ───────────
      - key: REDIS_URL
        fromService:
          name: codemorph-redis
          type: redis
          property: connectionString

      # ── JWT — set manually in Render dashboard ───────────────
      - key: JWT_SECRET
        sync: false               # openssl rand -base64 64

      - key: JWT_REFRESH_SECRET
        sync: false               # openssl rand -base64 64

      - key: JWT_EXPIRES_IN
        value: 15m

      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d

      - key: COOKIE_SECRET
        sync: false               # openssl rand -base64 32

      # ── CORS ─────────────────────────────────────────────────
      - key: FRONTEND_URL
        sync: false               # https://your-site.netlify.app

      # ── OAuth — GitHub ────────────────────────────────────────
      - key: GITHUB_CLIENT_ID
        sync: false

      - key: GITHUB_CLIENT_SECRET
        sync: false

      - key: GITHUB_CALLBACK_URL
        sync: false               # https://codemorph-backend.onrender.com/api/v1/auth/github/callback

      # ── OAuth — Google ────────────────────────────────────────
      - key: GOOGLE_CLIENT_ID
        sync: false

      - key: GOOGLE_CLIENT_SECRET
        sync: false

      - key: GOOGLE_CALLBACK_URL
        sync: false               # https://codemorph-backend.onrender.com/api/v1/auth/google/callback

      # ── AI Engine URL (if deployed separately) ────────────────
      - key: AI_ENGINE_URL
        sync: false               # https://codemorph-ai.onrender.com OR http://localhost:5000

      - key: AI_ENGINE_SECRET
        sync: false               # same as AI_ENGINE_SECRET in ai-engine

      # ── Stripe ───────────────────────────────────────────────
      - key: STRIPE_SECRET_KEY
        sync: false

      - key: STRIPE_WEBHOOK_SECRET
        sync: false

      # ── Feature flags ─────────────────────────────────────────
      - key: FEATURE_BILLING
        value: "false"            # set to "true" after Stripe configured

      - key: FEATURE_ANALYTICS
        value: "false"

    # Render health check — returns 200 when app is ready
    healthCheckPath: /api/v1/health

  # ── Redis (Bull job queues) ─────────────────────────────────
  - type: redis
    name: codemorph-redis
    region: frankfurt
    plan: starter                 # $10/mo — 25MB RAM
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []               # Internal Render network only

# ── PostgreSQL ───────────────────────────────────────────────
databases:
  - name: codemorph-postgres
    region: frankfurt
    plan: starter                 # $7/mo — 1GB storage
    databaseName: codemorph
    user: codemorph
    ipAllowList: []               # Internal Render network only
