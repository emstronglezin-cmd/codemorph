# ============================================================
# CodeMorph — CI Pipeline
# Lint + type-check + build matrix for all workspaces
# ============================================================
name: CI

on:
  push:
    branches: [main, develop, 'feat/**', 'fix/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ── Lint + Type-check (parallel) ──────────────────────────
  lint-typecheck:
    name: Lint & Type-check (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace: [frontend, backend, ai-engine, shared]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install root dependencies
        run: npm ci --workspace=${{ matrix.workspace }} --if-present

      - name: Lint
        run: npm run lint --workspace=${{ matrix.workspace }} --if-present
        continue-on-error: false

      - name: Type-check
        run: npm run type-check --workspace=${{ matrix.workspace }} --if-present
        continue-on-error: false

  # ── Build (depends on lint) ────────────────────────────────
  build:
    name: Build (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    needs: lint-typecheck
    strategy:
      fail-fast: false
      matrix:
        workspace: [frontend, backend, ai-engine]
        include:
          - workspace: frontend
            dockerfile: infra/docker/Dockerfile.frontend
            image: codemorph/frontend
          - workspace: backend
            dockerfile: infra/docker/Dockerfile.backend
            image: codemorph/backend
          - workspace: ai-engine
            dockerfile: infra/docker/Dockerfile.ai-engine
            image: codemorph/ai-engine

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install all dependencies
        run: npm ci

      - name: Build workspace
        run: npm run build --workspace=${{ matrix.workspace }} --if-present
        env:
          # Next.js build-time env
          NEXT_PUBLIC_API_URL: https://api.codemorph.ai/api/v1
          NEXT_PUBLIC_APP_URL: https://app.codemorph.ai

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push on CI)
        uses: docker/build-push-action@v5
        with:
          context:   .
          file:      ${{ matrix.dockerfile }}
          push:      false
          tags:      ${{ matrix.image }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Unit tests ────────────────────────────────────────────
  test:
    name: Unit Tests (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    needs: lint-typecheck
    strategy:
      fail-fast: false
      matrix:
        workspace: [backend, shared]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     test
          POSTGRES_PASSWORD: test
          POSTGRES_DB:       codemorph_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test --workspace=${{ matrix.workspace }} --if-present
        env:
          DATABASE_URL:  postgresql://test:test@localhost:5432/codemorph_test
          REDIS_URL:     redis://localhost:6379
          JWT_SECRET:    ci-test-secret-do-not-use-in-prod
          JWT_REFRESH_SECRET: ci-refresh-secret-do-not-use-in-prod
          NODE_ENV:      test

      - name: Upload coverage
        if: matrix.workspace == 'backend'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.workspace }}
          path: ${{ matrix.workspace }}/coverage
          retention-days: 7

  # ── Security audit ────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm audit --audit-level=high --workspaces
        continue-on-error: true   # warn, don't block

  # ── PR Summary ────────────────────────────────────────────
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint-typecheck, build, test]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.lint-typecheck.result }}" == "failure" || \
                "${{ needs.build.result }}"         == "failure" || \
                "${{ needs.test.result }}"          == "failure" ]]; then
            echo "❌ CI failed"
            exit 1
          fi
          echo "✅ All CI checks passed"
