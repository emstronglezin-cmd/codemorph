# ============================================================
# CodeMorph — Netlify Deployment Configuration
# Déployé depuis le repo GitHub : base directory = frontend
# Framework: Next.js 14 (SSR via @netlify/plugin-nextjs)
# PWA:       Service worker + manifest
# ============================================================

[build]
  base    = "frontend"
  command = "npm install --legacy-peer-deps && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION  = "20"
  NPM_VERSION   = "10"
  NODE_ENV      = "production"
  # Désactiver Husky sur Netlify CI
  HUSKY         = "0"
  # Ignorer les erreurs de type non-critiques au build
  NEXT_TELEMETRY_DISABLED = "1"

# ── Next.js plugin (SSR + API routes via Netlify Edge Functions) ─
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── Global security headers ───────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection       = "1; mode=block"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# ── Service Worker — never cached ────────────────────────────────
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control          = "no-store, no-cache, must-revalidate, proxy-revalidate"
    Content-Type           = "application/javascript; charset=utf-8"
    Service-Worker-Allowed = "/"

# ── PWA Manifest ─────────────────────────────────────────────────
[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Content-Type  = "application/manifest+json"
    Cache-Control = "public, max-age=86400, stale-while-revalidate=3600"

# ── Next.js static chunks (immutable — content-hashed) ───────────
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Next.js image optimization ────────────────────────────────────
[[headers]]
  for = "/_next/image*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=3600"

# ── PWA icons ─────────────────────────────────────────────────────
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, immutable"

# ── Redirects ─────────────────────────────────────────────────────
[[redirects]]
  from   = "/login"
  to     = "/auth/sign-in"
  status = 301

[[redirects]]
  from   = "/signup"
  to     = "/auth/sign-up"
  status = 301

[[redirects]]
  from   = "/register"
  to     = "/auth/sign-up"
  status = 301

# ── Environment variables à configurer dans Netlify Dashboard ─────
# Site settings > Environment variables:
#
# NEXT_PUBLIC_API_URL          = https://codemorph-backend.onrender.com/api/v1
# NEXT_PUBLIC_APP_URL          = https://YOUR-SITE.netlify.app
# NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY = pk_live_...
# NEXT_PUBLIC_FEATURE_BILLING  = true
# NEXT_PUBLIC_FEATURE_ANALYTICS = true
